name: CI/CD Demo

on:
    push:
        # Specify the branches that should trigger the pipeline when push
        branches: [main, development]
    pull_request:
        # Specify the branches that should trigger the pipeline when pull request
        branches: [main, development]
    workflow_dispatch:
        inputs:
            release_type:
                description: 'Release type'
                required: true
                default: 'patch'
                type: choice
                options:
                    - patch
                    - minor
                    - major
            target_env:
                description: 'Select Deployment Target'
                required: true
                type: choice
                default: 'none'
                options:
                    - 'none'
                    - 'github'
                    - 'firebase'

jobs:
    build:
        permissions:
            # Required if you want the pipeline to push changes to package.json
            contents: write
        outputs:
            # Declare your output variables so other jobs can see it
            env_name: ${{ steps.env-resolver.outputs.name }}
        runs-on: ubuntu-latest
        steps:
          - name: Checkout Code
            uses: actions/checkout@v4
            with:
                token: ${{ secrets.GITHUB_TOKEN }}
                ref: ${{ github.ref }}
            
          - name: Setup Node.js
            uses: actions/setup-node@v4
            with:
                # Set the node version required for your project
                node-version: '22'
                
          - name: Install Dependencies
            run: npm install

          - name: Set Version and Env
            id: env-resolver
            # Define how the pipeline should handle tagging for your specific deployment targets
            run: |
                # Configure git user for the commit
                git config --global user.name "github-actions[bot]"
                git config --global user.email "github-actions[bot]@users.noreply.github.com"

                # Only bump version if this was triggered MANUALLY via workflow_dispatch
                if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
                    RELEASE="${{ github.event.inputs.release_type }}"
                    echo "Manual release triggered: $RELEASE"
                    
                    npm version $RELEASE --no-git-tag-version
                    git add package.json
                    git commit -m "chore: bump version to $(node -p "require('./package.json').version") [skip ci]"
                    
                    # Push back using the explicit branch ref to avoid detached HEAD errors
                    git push origin HEAD:${{ github.ref_name }}
                else
                    echo "Automatic trigger (${{ github.event_name }}). Skipping version bump."
                fi

                # Resolve environment and output version
                VERSION=$(node -p "require('./package.json').version")
                if [[ $GITHUB_REF == 'refs/heads/main' ]]; then
                    echo "VITE_APP_VERSION=$VERSION" >> $GITHUB_ENV
                    echo "ENV_TYPE=production" >> $GITHUB_ENV
                    echo "name=production" >> $GITHUB_OUTPUT
                else
                    echo "VITE_APP_VERSION=$VERSION-staging" >> $GITHUB_ENV
                    echo "ENV_TYPE=staging" >> $GITHUB_ENV
                    echo "name=staging" >> $GITHUB_OUTPUT
                fi

          - name: Build Application
            env:
                # Inject Secrets into the Build
                VITE_SOME_API_KEY: ${{ secrets.VITE_SOME_API_KEY }}
                # App Version injected from previous step
                VITE_APP_VERSION: ${{ env.VITE_APP_VERSION }}
                VITE_APP_ENV: ${{ env.ENV_TYPE }}
            run: |
                if [[ $ENV_TYPE == 'production' ]]; then
                    npm run build:production
                else
                    npm run build:staging
                fi

          - name: Restructure Staging Artifact Directory
            run: |
                if [[ $ENV_TYPE == 'staging' ]]; then
                    echo "Nesting staging files into a /staging directory..."
                    mkdir -p dist_temp/staging
                    mv dist/* dist_temp/staging/
                    rm -rf dist
                    mv dist_temp dist
                fi
                
          - name: Upload Build Artifacts
            uses: actions/upload-pages-artifact@v3
            with:
                # Set your build folder name
                path: './dist'

    deploy:
        needs: build
        # Deploy ONLY when someone manually clicks the "Run workflow" button
        if: github.event_name == 'workflow_dispatch' && inputs.target_env != 'none'
        runs-on: ubuntu-latest
        permissions:
            pages: write
            id-token: write
        environment:
            name: ${{ needs.build.outputs.env_name }}
        steps:
          - name: Checkout Code
            uses: actions/checkout@v4

          - name: Download Build Artifacts
            uses: actions/download-artifact@v4
            with:
                name: github-pages
                path: ./dist

          - name: Deploy to GitHub Pages (Staging)
            if: inputs.target_env == 'github' && needs.build.outputs.env_name == 'staging'
            uses: actions/deploy-pages@v4

          - name: Deploy to GitHub Pages (Production)
            if: inputs.target_env == 'github' && needs.build.outputs.env_name == 'production'
            uses: actions/deploy-pages@v4

          - name: Deploy to Firebase (Staging)
            if: inputs.target_env == 'firebase' && needs.build.outputs.env_name == 'staging'
            uses: FirebaseExtended/action-hosting-deploy@v0
            with:
                repoToken: ${{ secrets.GITHUB_TOKEN }}
                firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
                #  Deploy to the staging URL
                target: your-staging-firebase-url
                channelId: live

          - name: Deploy to Firebase (Production)
            if: inputs.target_env == 'firebase' && needs.build.outputs.env_name == 'production'
            uses: FirebaseExtended/action-hosting-deploy@v0
            with:
                repoToken: ${{ secrets.GITHUB_TOKEN }}
                firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
                #  Deploy to the production URL
                target: your-production-firebase-url
                channelId: live